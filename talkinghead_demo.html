<!DOCTYPE html>
<html>

<head>
    <title>Talking Head - minimal example</title>

    <style>
        body,
        html {
            width: 100%;
            height: 100%;
            max-width: 800px;
            margin: auto;
            position: relative;
            background-color: #202020;
            color: white;
        }

        #avatar {
            display: block;
            width: 100%;
            height: 100%;
        }

        #controls {
            display: block;
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 50px;
        }

        #text {
            position: absolute;
            width: Calc(100% - 110px);
            height: 100%;
            top: 0;
            left: 0;
            bottom: 0;
            right: 110px;
            font-family: Arial;
            font-size: 20px;
        }

        #speak {
            display: block;
            position: absolute;
            top: 0;
            bottom: 0;
            right: 0;
            height: 100%;
            width: 100px;
            font-family: Arial;
            font-size: 20px;
        }

        #loading {
            display: block;
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            height: 50px;
            font-family: Arial;
            font-size: 20px;
        }
    </style>

    <script type="importmap">
  { "imports":
    {
      "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
      "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs"
    }
  }
  </script>

    <script type="module">
        import { TalkingHead } from "talkinghead";

        let head;

        document.addEventListener('DOMContentLoaded', async function (e) {

            const nodeAvatar = document.getElementById('avatar');
            head = new TalkingHead(nodeAvatar, {
                lipsyncModules: ["en", "fi"],
                cameraView: "upper"
            });

            const nodeLoading = document.getElementById('loading');
            try {
                nodeLoading.textContent = "Loading...";
                await head.showAvatar({
                    url: 'https://models.readyplayer.me/64bfa15f0e72c63d7c3934a6.glb?morphTargets=ARKit,Oculus+Visemes,mouthOpen,mouthSmile,eyesClosed,eyesLookUp,eyesLookDown&textureSizeLimit=1024&textureFormat=png',
                    body: 'F',
                    avatarMood: 'neutral'
                }, (ev) => {
                    if (ev.lengthComputable) {
                        let val = Math.min(100, Math.round(ev.loaded / ev.total * 100));
                        nodeLoading.textContent = "Loading " + val + "%";
                    }
                });
                nodeLoading.style.display = 'none';
            } catch (error) {
                console.log(error);
                nodeLoading.textContent = error.toString();
            }

            const nodeSpeak = document.getElementById('speak');
            if (nodeSpeak) {
                nodeSpeak.addEventListener('click', async function () {
                    try {
                        const text = document.getElementById('text').value;
                        if (text) {
                            // Use the internal audio context from TalkingHead
                            const audioContext = head.audioCtx;
                            if (audioContext && audioContext.state === 'suspended') {
                                await audioContext.resume();
                            }

                            // Fetch real human audio
                            const response = await fetch('kayit.wav');
                            const arrayBuffer = await response.arrayBuffer();
                            const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                            const durationMs = audioBuffer.duration * 1000;

                            // Create random visemes spreading across the audio duration
                            const visemes = [];
                            const vtimes = [];
                            const vdurations = [];
                            const words = [text];
                            const wtimes = [0];
                            const wdurations = [durationMs];

                            const oculusVisemes = ['aa', 'E', 'I', 'O', 'U', 'PP', 'SS', 'TH', 'CH', 'FF', 'kk', 'nn', 'RR', 'DD'];

                            let currentTime = 0;
                            while (currentTime < durationMs) {
                                // 25% chance to just insert a pause/silence to stop the lips
                                if (Math.random() < 0.25) {
                                    visemes.push('sil');
                                    vtimes.push(currentTime);
                                    const pauseDur = Math.random() * 300 + 200; // 200-500ms pause
                                    vdurations.push(pauseDur);
                                    currentTime += pauseDur;
                                } else {
                                    // normal speech
                                    visemes.push(oculusVisemes[Math.floor(Math.random() * oculusVisemes.length)]);
                                    vtimes.push(currentTime);
                                    const dur = Math.random() * 80 + 120; // 120-200ms per viseme
                                    vdurations.push(dur);
                                    currentTime += dur;
                                }
                            }
                            // End with silence
                            visemes.push('sil');
                            vtimes.push(currentTime);
                            vdurations.push(100);

                            // Play Audio Manually to bypass TalkingHead silent failures
                            const source = audioContext.createBufferSource();
                            source.buffer = audioBuffer;
                            source.connect(audioContext.destination);
                            source.start(0);

                            // Speak Audio with Visemes (TalkingHead handles the mouth and might also play audio if not broken)
                            const emptyBuffer = audioContext.createBuffer(1, audioContext.sampleRate * Math.ceil(audioBuffer.duration), audioContext.sampleRate);
                            await head.speakAudio({
                                audio: emptyBuffer,
                                words: words,
                                wtimes: wtimes,
                                wdurations: wdurations,
                                visemes: visemes,
                                vtimes: vtimes,
                                vdurations: vdurations
                            });
                        }
                    } catch (error) {
                        console.log(error);
                    }
                });
            }

            document.addEventListener("visibilitychange", async function (ev) {
                if (document.visibilityState === "visible") {
                    head.start();
                } else {
                    head.stop();
                }
            });

        });

    </script>
</head>

<body>
    <div id="avatar"></div>
    <div id="controls">
        <input id="text" type="text" value="That's one small step for man, one giant leap for mankind"
            style="width: 400px; font-size: 16px;">
        <input id="speak" type="button" value="Speak & Sync (Human Audio)">
    </div>
    <div id="loading"></div>
</body>

</html>
